<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Smart Eye – AI Document Scanner</title>
    <script>
      // Single-page app redirect for GitHub Pages.
      // Encodes the path as a query param and redirects to the root so that
      // index.html (the React app) can restore it via history.replaceState.
      // pathSegmentsToKeep=1 preserves the repo name segment (/smart_eye).
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?/" +
          l.pathname
            .slice(1)
            .split("/")
            .slice(pathSegmentsToKeep)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search
            ? "&" + l.search.slice(1).replace(/&/g, "~and~")
            : "") +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
